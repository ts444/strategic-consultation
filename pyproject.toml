[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = []

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true
exclude = ["mcp/"]

[tool.pytest.ini_options]
testpaths = ["harness/tests", "validator/tests", "mcp/portfolio-mcp/tests", "mcp/customer-mcp/tests"]
